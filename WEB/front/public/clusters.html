<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisation des Clusters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <style>
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
        }
        #map {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-cluster {
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 5px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-cluster:hover {
            background: #f0f0f0;
            border-color: #40916c;
        }
        .btn-cluster.active {
            background: #40916c;
            color: white;
            border-color: #40916c;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .spinner-border {
            color: #40916c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">🌳 Visualisation des Clusters d'Arbres</h1>
        
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Sélectionner le nombre de clusters</h5>
                <div class="controls">
                    <button class="btn-cluster active" onclick="chargerClusters(2)">
                        2 Clusters (Petit/Grand)
                    </button>
                    <button class="btn-cluster" onclick="chargerClusters(3)">
                        3 Clusters (Petit/Moyen/Grand)
                    </button>
                </div>
            </div>
        </div>

        <div id="mapLoading" class="loading" style="display: none;">
            <div class="spinner-border mb-3" role="status">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <p>Chargement des clusters en cours...</p>
        </div>

        <div id="map" style="min-height: 500px; display: none;"></div>

        <div id="errorContainer"></div>
    </div>

    <script type="module">
        import { renderClusteredMap } from './public/js/map.js';
        import { showError } from './public/js/errorHandler.js';

        window.chargerClusters = async function(n_clusters) {
            // Mettre à jour les boutons
            document.querySelectorAll('.btn-cluster').forEach((btn, idx) => {
                if (idx + 1 === n_clusters) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Afficher le loader
            document.getElementById('mapLoading').style.display = 'block';
            document.getElementById('map').style.display = 'none';

            try {
                // Appeler la fonction pour afficher les clusters
                await renderClusteredMap(n_clusters);
                document.getElementById('map').style.display = 'block';
            } catch (error) {
                showError(`Erreur: ${error.message}`, 'error');
            } finally {
                document.getElementById('mapLoading').style.display = 'none';
            }
        };

        // Charger les clusters au démarrage
        window.chargerClusters(2);
    </script>
</body>
</html>
